<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Revista</title>
    <style>
        body { margin: 0; padding: 0; background: #fff; text-align: center; }
        .spread { 
            display: flex; 
            justify-content: center; 
            gap: 20px; /* Margen blanco en el centro (Gutter) para grapas y doblez */
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            page-break-after: always; 
        }
        .page-box { 
            width: calc(50% - 10px); 
            box-sizing: border-box; 
        }
        .page-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        .page-box.empty { background: #fff; }
        
        @media print {
            @page { size: landscape; margin: 1cm; }
            body { margin: 0; }
            .spread { page-break-after: always; max-width: 100%; gap: 15mm; }
            .page-box { width: calc(50% - 7.5mm); }
        }
    </style>
</head>
<body>
    <div id="print-container"></div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('print-container');
            
            // Recuperar los pliegos (spreads) calculados por la ventana principal
            const printData = localStorage.getItem('printSpreads');
            if (!printData) {
                container.innerHTML = "<h2>Error: No hay datos de impresión. Vuelve a la revista y presiona imprimir nuevamente.</h2>";
                return;
            }

            const spreads = JSON.parse(printData);
            let html = "";

            spreads.forEach(spread => {
                let imgLeft = spread[0].url.includes('FFFFFF?text=') ? '' : `<img src="${spread[0].url}">`;
                let imgRight = spread[1].url.includes('FFFFFF?text=') ? '' : `<img src="${spread[1].url}">`;
                
                html += `
                    <div class="spread">
                        <div class="page-box ${imgLeft === '' ? 'empty' : ''}">${imgLeft}</div>
                        <div class="page-box ${imgRight === '' ? 'empty' : ''}">${imgRight}</div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Limpiar localStorage para no ocupar memoria innecesaria
            localStorage.removeItem('printSpreads');

            // Lanzar impresión automáticamente cuando carguen las imágenes
            setTimeout(() => {
                window.print();
            }, 800);
        });
    </script>
</body>
</html>
