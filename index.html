<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manual Interactivo Experience UNE">
    <title>Experience UNE - Manual Interactivo</title>
    <!-- Favicon profesional -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Lottie Player for loading/UI micro-interactions -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    
    <!-- PageFlip (StPageFlip) JS -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader-container">
        <!-- Lottie Animation - a nice loading circle/book generic one -->
        <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_p8bfn5to.json" background="transparent" speed="1" style="width: 150px; height: 150px;" loop autoplay></lottie-player>
        <p>Cargando experiencia...</p>
    </div>

    <!-- Main Content Container -->
    <div id="app-container">
        
        <!-- Instrucciones (Se desvanecerán al interactuar) -->
        <div id="interaction-hint" class="hint-text">
            Arrastra las esquinas de la hoja o usa tu teclado <span>( ← / → )</span> para leer
        </div>

        <!-- UI Overlay -->
        <div class="ui-overlay">
            
            <!-- Controles Superiores -->
            <div class="top-controls">
                <div id="page-counter" class="glass-pill">...</div>
                <button id="btn-print" class="glass-pill nav-btn-small" aria-label="Imprimir Revista" title="Imprimir">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                </button>
                <button id="btn-fullscreen" class="glass-pill nav-btn-small" aria-label="Pantalla Completa" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                </button>
            </div>

            <button id="btn-prev" class="nav-btn" aria-label="Página Anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button id="btn-next" class="nav-btn" aria-label="Siguiente Página">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <!-- Book Container -->
        <div class="book-wrapper">
            <div id="book-scaler">
                <div id="book">
                    <!-- Pages -->
                    <div class="page" data-density="hard">
                        <img src="./assets/img/1.jpg" alt="Portada" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/2b2b2b/FFFFFF?text=PORTADA'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/2.jpg" alt="Página 2" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+2'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/3.jpg" alt="Página 3" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+3'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/4.jpg" alt="Página 4" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+4'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/5.jpg" alt="Página 5" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+5'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/6.jpg" alt="Página 6" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+6'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/7.jpg" alt="Página 7" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+7'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/8.jpg" alt="Página 8" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+8'">
                    </div>
                    <div class="page">
                        <img src="./assets/img/9.jpg" alt="Página 9" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/FFFFFF/2b2b2b?text=PAGINA+9'">
                    </div>
                    <div class="page" data-density="hard">
                        <img src="./assets/img/10.jpg" alt="Contraportada" class="page-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x707/2b2b2b/FFFFFF?text=CONTRAPORTADA'">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JS logic -->
    <script src="./js/main.js"></script>
</body>
</html>
